spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:ecommerce_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

jwt.secret=${JWT_SECRET:U3ByaW5nQm9vdEVjb21tZXJjZUFwaVNlY3JldEtleTIwMjY=}
jwt.expiration=${JWT_EXPIRATION:3600000}

admin.username=${ADMIN_USERNAME:admin@test.com}
admin.password=${ADMIN_PASSWORD:Admin@123}
admin.role=${ADMIN_ROLE:ADMIN}